<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin - Suivi Paies</title>
</head>
<body>

  <h1>Admin - Mise à jour</h1>

  <label>Type :</label>
  <select id="type">
    <option value="monthly_pay">Paie mensuelle</option>
    <option value="advance_15n">Avance 15N</option>
    <option value="monthly_bonus">Prime mensuelle</option>
  </select>

  <br><br>

  <label>Étape actuelle :</label>
  <input type="text" id="currentStep">

  <br><br>

  <label>Statut :</label>
  <input type="text" id="statusLabel">

  <br><br>

  <label>BMOI :</label>
  <input type="text" id="bmoi">

  <br><br>

  <label>MCB :</label>
  <input type="text" id="mcb">

  <br><br>

  <label>BNI / BRED :</label>
  <input type="text" id="bni_bred">

  <br><br>

  <label>BOA / Autres :</label>
  <input type="text" id="boa_microcred_acces">

  <br><br>

  <button onclick="updateData()">Mettre à jour</button>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="firebase.js"></script>

  <script>
function updateData() {
  const type = document.getElementById("type").value;

  const update = {};

  const fields = [
    "currentStep",
    "statusLabel",
    "bmoi",
    "mcb",
    "bni_bred",
    "boa_microcred_acces"
  ];

  fields.forEach(field => {
    const value = document.getElementById(field).value.trim();
    if (value !== "") {
      update[field] = value;
    }
  });

  update.updatedAt = new Date().toLocaleString();

  db.collection("statuses").doc(type).update(update);

  alert("Mis à jour !");
}
  </script>

</body>
</html>
