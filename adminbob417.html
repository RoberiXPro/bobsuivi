<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin - Suivi Paies</title>
</head>
  <style>
  :root {
    --bg-1: #061122;
    --bg-2: #0b1730;
    --panel: rgba(12, 22, 42, 0.82);
    --line: rgba(255, 255, 255, 0.1);
    --text: #ecf3ff;
    --muted: #9fb0cc;
    --cyan: #53d8ff;
    --green: #36d399;
    --radius: 22px;
    --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(55, 130, 246, 0.22), transparent 28%),
      radial-gradient(circle at top right, rgba(139, 92, 246, 0.16), transparent 24%),
      linear-gradient(180deg, var(--bg-1), #030813 48%, var(--bg-2));
    min-height: 100vh;
    padding: 24px;
  }

  .admin-shell {
    width: min(680px, calc(100% - 24px));
    margin: 20px auto;
  }

  .admin-card {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 30px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .admin-top {
    padding: 24px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(90deg, rgba(83, 216, 255, 0.14), rgba(126, 231, 255, 0.05), rgba(168, 85, 247, 0.08));
  }

  .admin-top h1 {
    margin: 0 0 6px;
    font-size: 30px;
  }

  .admin-top p {
    margin: 0;
    color: var(--muted);
  }

  .admin-body {
    padding: 24px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full {
    grid-column: 1 / -1;
  }

  label {
    font-size: 14px;
    color: var(--muted);
    font-weight: bold;
  }

input,
select {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.06);
  color: var(--text);
  border-radius: 14px;
  padding: 14px 16px;
  outline: none;
  appearance: none;
}

select option {
  background: #0b1730;
  color: #ecf3ff;
}

  input::placeholder {
    color: #8ea0bc;
  }

  .admin-actions {
    margin-top: 22px;
    display: flex;
    justify-content: flex-end;
  }

  .admin-btn {
    border: none;
    border-radius: 16px;
    padding: 14px 20px;
    cursor: pointer;
    background: var(--cyan);
    color: #04111d;
    font-weight: bold;
  }

  .admin-help {
    margin-top: 16px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  @media (max-width: 700px) {
    .form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
<body>

  <h1>Admin - Mise à jour</h1>

  <label>Type :</label>
  <select id="type">
    <option value="monthly_pay">Paie mensuelle</option>
    <option value="advance_15n">Avance 15N</option>
    <option value="monthly_bonus">Prime mensuelle</option>
  </select>

  <br><br>

  <label>Étape actuelle :</label>
  <input type="text" id="currentStep">

  <br><br>

  <label>Statut :</label>
  <input type="text" id="statusLabel">
<div id="advanceDatesFields" style="display:none;">
  <br><br>

  <label>Ouvert le :</label>
  <input type="date" id="openDate">

  <br><br>

  <label>Fermé le :</label>
  <input type="date" id="closeDate">
</div>
  <br><br>

  <label>BMOI :</label>
  <input type="text" id="bmoi">

  <br><br>

  <label>MCB :</label>
  <input type="text" id="mcb">

  <br><br>

  <label>BNI / BRED :</label>
  <input type="text" id="bni_bred">

  <br><br>

  <label>BOA / Autres :</label>
  <input type="text" id="boa_microcred_acces">

  <br><br>

  <button onclick="updateData()">Mettre à jour</button>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="firebase.js"></script>

  <script>
function updateData() {
  const type = document.getElementById("type").value;

  const update = {};

const fields = [
  "currentStep",
  "statusLabel",
  "openDate",
  "closeDate",
  "bmoi",
  "mcb",
  "bni_bred",
  "boa_microcred_acces"
];

  fields.forEach(field => {
    const value = document.getElementById(field).value.trim();
    if (value !== "") {
      update[field] = value;
    }
  });

  update.updatedAt = new Date().toLocaleString();

  db.collection("statuses").doc(type).update(update);

  alert("Mis à jour !");
}
  </script>
<script>
  function toggleAdvanceFields() {
    const type = document.getElementById("type").value;
    const block = document.getElementById("advanceDatesFields");

    if (type === "advance_15n") {
      block.style.display = "block";
    } else {
      block.style.display = "none";
    }
  }

  document.getElementById("type").addEventListener("change", toggleAdvanceFields);
  toggleAdvanceFields();
</script>
</body>
</html>
